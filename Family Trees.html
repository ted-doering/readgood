document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lay: swap;\n  src: url(\"3a7a7dcd-8d3d-4926-9fa5-26f4f5db411e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"d4191c4c-df86-4d97-90a4-8a33d8e01492\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"76192e6d-d313-497d-81ad-44968e13ef59\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { font-family: 'Montserrat', system-ui, sans-serif; background: #f4f1e8; color: #262521; -webkit-font-smoothing: antialiased; }\n  a { color: #11521b; }\n  a:hover { color: #0c3c14; }\n  ::selection { background: rgba(17,82,27,0.18); }\n  .silmft-scroll::-webkit-scrollbar { height: 10px; width: 10px; }\n  .silmft-scroll::-webkit-scrollbar-thumb { background: #d8d3c2; border-radius: 8px; border: 3px solid #f4f1e8; }\n  .silmft-scroll::-webkit-scrollbar-track { background: transparent; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:#f4f1e8; display:flex; flex-direction:column;\">\n\n  <header style=\"background:#11521b; color:#eef2e9; padding:20px clamp(16px,4vw,48px) 18px; display:flex; flex-wrap:wrap; align-items:center; gap:14px 26px;\">\n    <div style=\"flex:1; min-width:230px;\">\n      <span style=\"font-size:11px; letter-spacing:0.2em; text-transform:uppercase; font-weight:600; color:#9cc4a1;\">The Silmarillion · Reading Companion<\u002Fspan>\n      <h1 style=\"margin:7px 0 0 0; font-size:clamp(24px,4vw,32px); font-weight:800; letter-spacing:-0.01em; line-height:1.1;\">Family Trees<\u002Fh1>\n    <\u002Fdiv>\n    <button sc-camel-on-click=\"{{ toggleSpoilers }}\" style=\"{{ spoilerStyle }}\" style-hover=\"filter:brightness(1.06);\">\n      <span style=\"width:8px; height:8px; border-radius:50%; background:{{ spoilerDot }};\"><\u002Fspan>{{ spoilerLabel }}\n    <\u002Fbutton>\n  <\u002Fheader>\n\n  <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:10px 20px; padding:13px clamp(16px,4vw,48px); border-bottom:1.5px solid #e0dbcb; background:#f4f1e8; position:sticky; top:0; z-index:30;\">\n    <sc-if value=\"{{ showTabs }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n        <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <button sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ t.style }}\" style-hover=\"filter:brightness(0.97);\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <sc-if value=\"{{ legendOn }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:14px;\">\n        <sc-for list=\"{{ legend }}\" as=\"l\" hint-placeholder-count=\"4\">\n          <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; letter-spacing:0.06em; color:#6f6b5c;\">\n            <span style=\"width:9px; height:9px; border-radius:3px; background:{{ l.color }};\"><\u002Fspan>{{ l.label }}\n          <\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"font-size:11px; font-weight:500; color:#a8a493;\">Hover a name for a quick look · click for the full story · + opens a branch<\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ loading }}\">\n    <div style=\"padding:60px 20px; text-align:center; font-size:13.5px; color:#8a8676;\">Unrolling the scrolls of lineage…<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-for list=\"{{ views }}\" as=\"view\" hint-placeholder-count=\"1\">\n    <section data-screen-label=\"{{ view.title }}\" style=\"padding:26px clamp(14px,4vw,44px) 0;\">\n      <div style=\"margin:0 0 6px;\">\n        <h2 style=\"margin:0 0 5px; font-size:19px; font-weight:800; letter-spacing:-0.01em; color:#1c1b16;\">{{ view.title }}<\u002Fh2>\n        <p style=\"margin:0; font-size:13.5px; line-height:1.6; color:#8a8676; max-width:640px; text-wrap:pretty;\">{{ view.sub }}<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"silmft-scroll\" style=\"overflow-x:auto; padding:4px 0 0;\">\n        <div style=\"position:relative; margin:0 auto; width:{{ view.w }}px; height:{{ view.h }}px;\">\n          <svg width=\"{{ view.w }}\" height=\"{{ view.h }}\" style=\"position:absolute; left:0; top:0; pointer-events:none;\">\n            <sc-for list=\"{{ view.edges }}\" as=\"e\" hint-placeholder-count=\"4\">\n              <path d=\"{{ e.d }}\" fill=\"none\" stroke=\"#bcb49b\" stroke-width=\"1.5\"><\u002Fpath>\n            <\u002Fsc-for>\n          <\u002Fsvg>\n          <sc-for list=\"{{ view.nodes }}\" as=\"n\" hint-placeholder-count=\"6\">\n            <div style=\"{{ n.wrapStyle }}\" sc-camel-on-mouse-enter=\"{{ n.onEnter }}\" sc-camel-on-mouse-leave=\"{{ n.onLeave }}\">\n              <sc-if value=\"{{ n.isNote }}\">\n                <div style=\"position:absolute; inset:0; border:1.5px dashed #b5ad94; border-radius:10px; display:flex; align-items:center; justify-content:center; padding:5px 10px; text-align:center;\">\n                  <span style=\"font-size:10px; font-style:italic; line-height:1.35; color:#8a8676;\">{{ n.sub }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ n.isPerson }}\">\n                <button sc-camel-on-click=\"{{ n.onClick }}\" style=\"{{ n.cardStyle }}\" style-hover=\"box-shadow:0 6px 16px rgba(28,43,26,0.16); transform:translateY(-1px);\">\n                  <span style=\"font-size:13px; font-weight:700; color:#1c1b16; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ n.name }}<\u002Fspan>\n                  <span style=\"font-size:9.5px; font-weight:600; letter-spacing:0.02em; color:#8a8676; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ n.sub }}<\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ n.canToggle }}\">\n                  <button sc-camel-on-click=\"{{ n.onToggle }}\" style=\"{{ n.toggleStyle }}\" style-hover=\"filter:brightness(1.15);\">{{ n.toggleLabel }}<\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ n.tip }}\">\n                  <div style=\"{{ n.tipStyle }}\">\n                    <div style=\"background:#ffffff; border:1px solid #ded8c6; border-radius:12px; box-shadow:0 14px 36px rgba(28,43,26,0.22); padding:13px 15px; text-align:left;\">\n                      <div style=\"display:flex; align-items:center; gap:7px; margin-bottom:4px;\">\n                        <span style=\"width:8px; height:8px; border-radius:50%; background:{{ n.color }};\"><\u002Fspan>\n                        <span style=\"font-size:10px; letter-spacing:0.14em; text-transform:uppercase; font-weight:700; color:#7a8a6f;\">{{ n.kin }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"font-size:14.5px; font-weight:800; color:#1c1b16; margin-bottom:5px;\">{{ n.name }}<\u002Fdiv>\n                      <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#37362e; text-wrap:pretty;\">{{ n.bio }}<\u002Fp>\n                      <sc-if value=\"{{ n.fate }}\">\n                        <p style=\"margin:8px 0 0; font-size:12px; line-height:1.5; color:#8a6d1f;\"><strong style=\"letter-spacing:0.12em; font-size:9.5px; text-transform:uppercase;\">Fate · <\u002Fstrong>{{ n.fate }}<\u002Fp>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ n.fateHidden }}\">\n                        <button sc-camel-on-click=\"{{ n.onReveal }}\" style=\"display:block; width:100%; text-align:left; margin:8px 0 0; padding:6px 9px; background:transparent; border:1.5px dashed #c9c2ad; border-radius:8px; cursor:pointer; font-family:inherit; font-size:11px; font-style:italic; color:#8a8676;\" style-hover=\"border-color:#8a8676; color:#5c5949;\">Fate hidden — click to peek<\u002Fbutton>\n                      <\u002Fsc-if>\n                      <a href=\"{{ n.tg }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block; margin-top:9px; font-size:12px; font-weight:700; color:#11521b;\">Tolkien Gateway ↗<\u002Fa>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-for>\n\n  <sc-if value=\"{{ panelShow }}\">\n    <aside class=\"silmft-scroll\" style=\"position:fixed; top:0; right:0; bottom:0; width:min(380px,94vw); background:#fbfaf5; border-left:1px solid #ded8c6; box-shadow:-16px 0 44px rgba(28,43,26,0.16); z-index:90; overflow-y:auto; padding:26px 28px 34px;\">\n      <button sc-camel-on-click=\"{{ closePanel }}\" style=\"position:absolute; top:14px; right:14px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:8px; background:#efeadb; border:1px solid #ded8c6; color:#37362e; font-size:17px; line-height:1; cursor:pointer; font-family:inherit;\" style-hover=\"background:#e4ddc9;\">×<\u002Fbutton>\n      <div style=\"display:flex; align-items:center; gap:8px; margin:2px 0 10px;\">\n        <span style=\"width:10px; height:10px; border-radius:50%; background:{{ panel.color }};\"><\u002Fspan>\n        <span style=\"font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; color:#7a8a6f;\">{{ panel.kin }}<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin:0 0 4px; font-size:25px; font-weight:800; letter-spacing:-0.01em; color:#1c1b16;\">{{ panel.name }}<\u002Fh2>\n      <sc-if value=\"{{ panel.title }}\">\n        <div style=\"font-size:13px; font-weight:600; color:#11521b; margin-bottom:14px;\">{{ panel.title }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <p style=\"font-size:14.5px; line-height:1.68; color:#37362e; margin:0 0 18px; text-wrap:pretty;\">{{ panel.bio }}<\u002Fp>\n      <sc-if value=\"{{ panel.fate }}\">\n        <div style=\"background:#f6efdb; border:1px solid #e3d3a4; border-radius:10px; padding:12px 14px; margin-bottom:18px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:5px;\">\n            <div style=\"font-size:10px; letter-spacing:0.18em; text-transform:uppercase; font-weight:700; color:#8a6d1f;\">Fate<\u002Fdiv>\n            <sc-if value=\"{{ panel.canHide }}\">\n              <button sc-camel-on-click=\"{{ toggleSelFate }}\" style=\"background:transparent; border:none; padding:0; cursor:pointer; font-family:inherit; font-size:10.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#8a6d1f; text-decoration:underline;\" style-hover=\"color:#5c491a;\">Hide<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <p style=\"margin:0; font-size:13.5px; line-height:1.6; color:#5c491a; text-wrap:pretty;\">{{ panel.fate }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ panel.fateHidden }}\">\n        <button sc-camel-on-click=\"{{ toggleSelFate }}\" style=\"display:block; width:100%; text-align:left; background:transparent; border:1.5px dashed #c9c2ad; border-radius:10px; padding:12px 14px; margin-bottom:18px; cursor:pointer; font-family:inherit;\" style-hover=\"border-color:#8a8676;\">\n          <span style=\"font-size:12.5px; font-weight:600; color:#8a8676;\">Fate hidden — click to reveal for {{ panel.name }} only<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-for list=\"{{ panel.rels }}\" as=\"rg\" hint-placeholder-count=\"2\">\n        <div style=\"margin-bottom:15px;\">\n          <div style=\"font-size:10.5px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; color:#7a8a6f; margin-bottom:7px;\">{{ rg.h }}<\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n            <sc-for list=\"{{ rg.items }}\" as=\"ri\" hint-placeholder-count=\"2\">\n              <button sc-camel-on-click=\"{{ ri.onClick }}\" style=\"background:#ffffff; border:1px solid #ddd8c7; border-radius:99px; padding:6px 13px; font-size:12.5px; font-weight:600; color:#11521b; cursor:pointer; font-family:inherit;\" style-hover=\"border-color:#11521b; background:#f0f4ee;\">{{ ri.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <a href=\"{{ panel.tg }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:8px; margin-top:10px; text-decoration:none; font-size:12.5px; font-weight:700; letter-spacing:0.03em; color:#fff; background:#11521b; border:1.5px solid #11521b; padding:11px 20px; border-radius:99px;\" style-hover=\"filter:brightness(0.94);\">Read more on Tolkien Gateway ↗<\u002Fa>\n    <\u002Faside>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;layout&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;tabbed&quot;, &quot;stacked&quot;], &quot;default&quot;: &quot;tabbed&quot;, &quot;tsType&quot;: &quot;'tabbed' | 'stacked'&quot;, &quot;section&quot;: &quot;Layout&quot;, &quot;description&quot;: &quot;Switchable tabs per house, or all four trees stacked down the page&quot; },\n  &quot;expandAll&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Layout&quot;, &quot;description&quot;: &quot;Show every branch fully expanded (hides the +/− toggles)&quot; },\n  &quot;showLegend&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Chrome&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { booted: false, active: \"finwe\", open: {}, hover: null, sel: null, spoilers: false, revealed: {} };\n\n  revealFate = (id) => this.setState((s) => {\n    const revealed = Object.assign({}, s.revealed);\n    revealed[id] = !revealed[id];\n    return { revealed: revealed };\n  });\n\n  CW = 168; CH = 58; MG = 26; SG = 18; BG = 44; VG = 66;\n\n  componentDidMount() {\n    let tries = 0;\n    const boot = () => {\n      const D = window.SILM_TREE;\n      if (!D) { if (tries++ < 80) setTimeout(boot, 50); return; }\n      this.D = D;\n      const open = {};\n      D.houses.forEach((h) => (h.open || []).forEach((id) => { open[id] = true; }));\n      this.rels = this.buildRels(D);\n      this.setState({ booted: true, open });\n    };\n    boot();\n  }\n\n  isNote(id) { return !!(this.D && this.D.people[id] && this.D.people[id].race === \"note\"); }\n\n  buildRels(D) {\n    const R = {};\n    const get = (id) => R[id] || (R[id] = { parents: [], spouses: [], children: [] });\n    const add = (arr, id) => { if (arr.indexOf(id) === -1) arr.push(id); };\n    const walk = (node) => {\n      const p = node.p;\n      (node.u || []).forEach((u) => {\n        if (u.s && !this.isNote(p) && !this.isNote(u.s)) {\n          add(get(p).spouses, u.s); add(get(u.s).spouses, p);\n        }\n        (u.c || []).forEach((ch) => {\n          const kid = ch.p;\n          if (!this.isNote(kid) && !this.isNote(p)) {\n            add(get(kid).parents, p); add(get(p).children, kid);\n            if (u.s && !this.isNote(u.s)) { add(get(kid).parents, u.s); add(get(u.s).children, kid); }\n          }\n          walk(ch);\n        });\n      });\n    };\n    D.houses.forEach((h) => h.roots.forEach(walk));\n    return R;\n  }\n\n  hasKids(node) { return (node.u || []).some((u) => (u.c || []).length); }\n\n  isOpen(node) {\n    if (!this.hasKids(node)) return false;\n    if (this.isNote(node.p)) return true;\n    if (this.props.expandAll) return true;\n    return !!this.state.open[node.p];\n  }\n\n  countDesc(node) {\n    let n = 0;\n    (node.u || []).forEach((u) => (u.c || []).forEach((c) => {\n      if (!this.isNote(c.p)) n += 1;\n      n += this.countDesc(c);\n    }));\n    return n;\n  }\n\n  measure(node, memo) {\n    if (memo.has(node)) return memo.get(node);\n    const unions = node.u || [];\n    const sp = unions.filter((u) => u.s).length;\n    const rowW = (1 + sp) * this.CW + sp * this.MG;\n    const blocks = [];\n    let childW = 0;\n    if (this.isOpen(node)) {\n      unions.forEach((u) => {\n        const kids = u.c || [];\n        if (!kids.length) return;\n        let w = 0;\n        kids.forEach((c, i) => { w += this.measure(c, memo).w + (i ? this.SG : 0); });\n        blocks.push({ u: u, w: w });\n      });\n      blocks.forEach((b, i) => { childW += b.w + (i ? this.BG : 0); });\n    }\n    const m = { w: Math.max(rowW, childW), rowW: rowW, blocks: blocks, childW: childW };\n    memo.set(node, m);\n    return m;\n  }\n\n  place(node, x, y, ctx) {\n    const m = this.measure(node, ctx.memo);\n    const unions = node.u || [];\n    const withS = unions.filter((u) => u.s);\n    let order;\n    if (withS.length >= 2) order = [{ id: withS[0].s }, { id: node.p, main: true }, { id: withS[1].s }];\n    else if (withS.length === 1) order = [{ id: node.p, main: true }, { id: withS[0].s }];\n    else order = [{ id: node.p, main: true }];\n    const rowX = x + (m.w - m.rowW) / 2;\n    order.forEach((c, i) => {\n      c.x = rowX + i * (this.CW + this.MG);\n      this.pushNode(ctx, c.id, c.x, y, c.main ? node : null);\n    });\n    for (let i = 0; i < order.length - 1; i++) {\n      const x1 = order[i].x + this.CW, x2 = order[i + 1].x, my = y + this.CH / 2;\n      ctx.edges.push({ d: \"M\" + x1 + \" \" + (my - 2) + \" H\" + x2 + \" M\" + x1 + \" \" + (my + 2) + \" H\" + x2 });\n    }\n    const mainIdx = order.findIndex((c) => c.main);\n    const pCx = order[mainIdx].x + this.CW / 2;\n    if (this.isOpen(node) && m.blocks.length) {\n      let cx = x + (m.w - m.childW) / 2;\n      const busY = y + this.CH + this.VG / 2;\n      const childTop = y + this.CH + this.VG;\n      m.blocks.forEach((b) => {\n        let ax;\n        if (b.u.s) {\n          const si = order.findIndex((c) => c.id === b.u.s && !c.main);\n          ax = (order[si].x + order[mainIdx].x) / 2 + this.CW / 2;\n        } else ax = pCx;\n        const childXs = [];\n        let bx = cx;\n        (b.u.c || []).forEach((c) => {\n          const cm = this.measure(c, ctx.memo);\n          const r = this.place(c, bx, childTop, ctx);\n          childXs.push(r.ax);\n          bx += cm.w + this.SG;\n        });\n        let d = \"M\" + ax + \" \" + (y + this.CH) + \" V\" + busY;\n        const minX = Math.min.apply(null, [ax].concat(childXs));\n        const maxX = Math.max.apply(null, [ax].concat(childXs));\n        d += \" M\" + minX + \" \" + busY + \" H\" + maxX;\n        childXs.forEach((cxx) => { d += \" M\" + cxx + \" \" + busY + \" V\" + childTop; });\n        ctx.edges.push({ d: d });\n        cx += b.w + this.BG;\n      });\n    }\n    ctx.maxY = Math.max(ctx.maxY, y);\n    return { ax: pCx };\n  }\n\n  pushNode(ctx, id, x, y, treeNode) {\n    const P = this.D.people[id] || { name: id, race: \"elf\" };\n    const race = this.D.races[P.race] || { color: \"#888\", label: \"\" };\n    const key = ctx.houseId + \"_\" + (ctx.n++);\n    const isNote = P.race === \"note\";\n    const hovered = this.state.hover === key;\n    const sel = this.state.sel === id;\n    const item = {\n      key: key, id: id, x: x, y: y,\n      isPerson: !isNote, isNote: isNote,\n      wrapStyle: \"position:absolute; left:\" + x + \"px; top:\" + y + \"px; width:168px; height:58px; z-index:\" + (hovered ? 60 : 1) + \";\",\n      name: P.name,\n      sub: P.title || race.label,\n      color: race.color,\n      kin: P.kin || race.label,\n      bio: P.bio || \"\",\n      fateText: P.fate || \"\",\n      tg: P.tg || \"\",\n      tip: false,\n      cardStyle: \"position:absolute; inset:0; width:100%; display:flex; flex-direction:column; justify-content:center; gap:2px; padding:6px 11px; text-align:left; background:#fbfaf5; border:1px solid #ded8c6; border-top:3px solid \" + race.color + \"; border-radius:10px; cursor:pointer; font-family:inherit; transition:box-shadow 0.15s ease, transform 0.15s ease;\" + (sel ? \" box-shadow:0 0 0 3px rgba(17,82,27,0.28);\" : \"\")\n    };\n    if (!isNote) {\n      item.onClick = () => this.setState({ sel: id });\n      item.onEnter = () => this.setState({ hover: key });\n      item.onLeave = () => this.setState((s) => (s.hover === key ? { hover: null } : null));\n    }\n    if (treeNode && this.hasKids(treeNode) && !isNote && !this.props.expandAll) {\n      const openN = this.isOpen(treeNode);\n      item.canToggle = true;\n      item.toggleLabel = openN ? \"–\" : \"+\" + this.countDesc(treeNode);\n      item.toggleStyle = \"position:absolute; left:50%; transform:translateX(-50%); bottom:-11px; min-width:22px; height:22px; display:flex; align-items:center; justify-content:center; border-radius:99px; background:\" + (openN ? \"#8a8676\" : \"#11521b\") + \"; color:#fff; font-size:11px; font-weight:800; border:2px solid #f4f1e8; cursor:pointer; padding:0 6px; z-index:5; font-family:inherit; transition:filter 0.15s ease;\";\n      item.onToggle = (e) => {\n        e.stopPropagation();\n        this.setState((s) => {\n          const open = Object.assign({}, s.open);\n          open[id] = !open[id];\n          return { open: open };\n        });\n      };\n    }\n    ctx.nodes.push(item);\n  }\n\n  layoutHouse(h) {\n    const memo = new Map();\n    const ctx = { memo: memo, nodes: [], edges: [], maxY: 0, n: 0, houseId: h.id, w: 0 };\n    const PAD = 24;\n    const widths = h.roots.map((r) => this.measure(r, memo).w);\n    const totalW = widths.reduce((a, b) => a + b, 0) + this.BG * (h.roots.length - 1);\n    ctx.w = totalW + 2 * PAD;\n    let x = PAD;\n    h.roots.forEach((r, i) => { this.place(r, x, 20, ctx); x += widths[i] + this.BG; });\n    const hgt = ctx.maxY + this.CH + 250;\n    const hov = ctx.nodes.find((it) => it.key === this.state.hover);\n    if (hov && hov.isPerson) {\n      hov.tip = true;\n      const shown = this.state.spoilers || !!this.state.revealed[hov.id];\n      hov.fate = shown ? hov.fateText : \"\";\n      hov.fateHidden = !shown && !!hov.fateText;\n      hov.onReveal = () => this.revealFate(hov.id);\n      let s = \"position:absolute; width:262px; z-index:70; cursor:default; top:58px; padding-top:8px;\";\n      if (hov.x < 150) s += \"left:-4px;\";\n      else if (hov.x > ctx.w - 318) s += \"right:-4px;\";\n      else s += \"left:-47px;\";\n      hov.tipStyle = s;\n    }\n    return { key: h.id, title: h.title, sub: h.sub, w: ctx.w, h: hgt, nodes: ctx.nodes, edges: ctx.edges };\n  }\n\n  toggleSpoilers = () => this.setState((s) => ({ spoilers: !s.spoilers }));\n  closePanel = () => this.setState({ sel: null });\n\n  renderVals() {\n    if (!this.state.booted) {\n      return { loading: true, showTabs: false, legendOn: false, views: [], tabs: [], legend: [], panelShow: false, panel: {},\n        toggleSpoilers: this.toggleSpoilers, closePanel: this.closePanel,\n        spoilerLabel: \"Spoilers hidden\", spoilerDot: \"#9cc4a1\",\n        spoilerStyle: \"display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:700; letter-spacing:0.04em; padding:9px 16px; border-radius:99px; background:rgba(255,255,255,0.08); color:#eef2e9; border:1.5px solid rgba(255,255,255,0.25); transition:filter 0.15s ease;\" };\n    }\n    const D = this.D;\n    const layout = this.props.layout || \"tabbed\";\n    const stacked = layout === \"stacked\";\n    const shown = stacked ? D.houses : D.houses.filter((h) => h.id === this.state.active);\n    const views = shown.map((h) => this.layoutHouse(h));\n\n    const tabBase = \"cursor:pointer; font-family:inherit; font-size:12.5px; font-weight:700; letter-spacing:0.02em; padding:8px 16px; border-radius:99px; transition:filter 0.15s ease;\";\n    const tabs = D.houses.map((h) => ({\n      label: h.title,\n      onClick: () => this.setState({ active: h.id, hover: null }),\n      style: tabBase + (h.id === this.state.active\n        ? \"background:#11521b; color:#ffffff; border:1.5px solid #11521b;\"\n        : \"background:transparent; color:#37362e; border:1.5px solid #c9c2ad;\")\n    }));\n\n    const legend = [\"elf\", \"maia\", \"man\", \"half\"].map((r) => ({ label: D.races[r].label, color: D.races[r].color }));\n\n    const sp = this.state.spoilers;\n    const spoilerStyle = \"display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:700; letter-spacing:0.04em; padding:9px 16px; border-radius:99px; transition:filter 0.15s ease;\" + (sp\n      ? \"background:#d8bd76; color:#3a2e10; border:1.5px solid #d8bd76;\"\n      : \"background:rgba(255,255,255,0.08); color:#eef2e9; border:1.5px solid rgba(255,255,255,0.25);\");\n\n    let panel = {};\n    const selId = this.state.sel;\n    if (selId && D.people[selId]) {\n      const P = D.people[selId];\n      const race = D.races[P.race] || {};\n      const r = this.rels[selId] || { parents: [], spouses: [], children: [] };\n      const chip = (id) => ({ label: (D.people[id] || { name: id }).name, onClick: () => this.setState({ sel: id }) });\n      const rels = [];\n      if (r.parents.length) rels.push({ h: \"Parents\", items: r.parents.map(chip) });\n      if (r.spouses.length) rels.push({ h: r.spouses.length > 1 ? \"Spouses\" : \"Spouse\", items: r.spouses.map(chip) });\n      if (r.children.length) rels.push({ h: \"Children\", items: r.children.map(chip) });\n      const shownFate = sp || !!this.state.revealed[selId];\n      panel = {\n        name: P.name, title: P.title || \"\", kin: P.kin || race.label, color: race.color,\n        bio: P.bio || \"\", tg: P.tg || \"\",\n        fate: shownFate ? (P.fate || \"\") : \"\",\n        fateHidden: !shownFate && !!P.fate,\n        canHide: !sp && !!this.state.revealed[selId] && !!P.fate,\n        rels: rels\n      };\n    }\n\n    return {\n      loading: false,\n      showTabs: !stacked,\n      legendOn: this.props.showLegend !== false,\n      tabs: tabs,\n      legend: legend,\n      views: views,\n      spoilerLabel: sp ? \"Fates revealed\" : \"Spoilers hidden\",\n      spoilerDot: sp ? \"#6b5416\" : \"#9cc4a1\",\n      spoilerStyle: spoilerStyle,\n      toggleSpoilers: this.toggleSpoilers,\n      panelShow: !!selId,\n      panel: panel,\n      toggleSelFate: () => this.revealFate(selId),\n      closePanel: this.closePanel\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
