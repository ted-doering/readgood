  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"e824a840-9944-45f2-9407-6ee008434d31\"><\u002Fscript>\n<script src=\"92b30cc1-2b18-4057-8158-d5c5119eee1a\"><\u002Fscript>\n<script src=\"238f411a-49ab-456a-bd84-f9079a2717d4\"><\u002Fscript>\n<script src=\"380ea635-679f-4e3d-b510-f8b7f0ee458f\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; height: 100%; }\n  body { font-family: 'Montserrat', system-ui, sans-serif; background: #f4f1e8; color: #262521; -webkit-font-smoothing: antialiased; }\n  a { color: #11521b; }\n  a:hover { color: #0c3c14; }\n  ::selection { background: rgba(17,82,27,0.18); }\n  .silm-scroll::-webkit-scrollbar { width: 10px; }\n  .silm-scroll::-webkit-scrollbar-thumb { background: #d8d3c2; border-radius: 8px; border: 3px solid #f4f1e8; }\n  .silm-scroll::-webkit-scrollbar-track { background: transparent; }\n  .silm-note::placeholder { color: #a8a493; }\n  .silm-search::placeholder { color: #7fae86; }\n  .silm-auth::placeholder { color: #a8a493; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{ rootStyle }}\">\n\n  <sc-if value=\"{{ drawerBackdrop }}\">\n    <div onclick=\"{{ closeDrawer }}\" style=\"position:fixed; inset:0; background:rgba(10,26,13,0.5); z-index:40;\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n  <aside style=\"{{ asideStyle }}\">\n    <div style=\"padding:28px 28px 20px 28px; border-bottom:1px solid rgba(255,255,255,0.10); display:flex; align-items:flex-start; justify-content:space-between; gap:14px;\">\n      <div style=\"min-width:0;\">\n        <div style=\"font-size:11px; letter-spacing:0.28em; text-transform:uppercase; font-weight:600; color:#9cc4a1; margin-bottom:11px;\">A Book Club Companion<\u002Fdiv>\n        <div style=\"font-size:26px; font-weight:800; line-height:1.12; letter-spacing:-0.01em;\">The Silmarillion<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ isMobile }}\">\n        <button onclick=\"{{ closeDrawer }}\" style=\"flex:0 0 auto; width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); border-radius:8px; color:#eef2e9; cursor:pointer; font-size:19px; line-height:1;\">×<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"padding:16px 28px 14px 28px; border-bottom:1px solid rgba(255,255,255,0.10);\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px;\">\n        <span style=\"font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-weight:600; color:#9cc4a1;\">Your Progress<\u002Fspan>\n        <span style=\"font-size:12px; font-weight:600; color:#eef2e9;\">{{ progressLabel }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"height:7px; background:rgba(255,255,255,0.14); border-radius:99px; overflow:hidden;\">\n        <div style=\"height:100%; width:{{ progressPct }}%; background:linear-gradient(90deg,#7dc088,#a9d8ae); border-radius:99px; transition:width 0.35s ease;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:14px 20px; border-bottom:1px solid rgba(255,255,255,0.10);\">\n      <button onclick=\"{{ openTrackers }}\" style=\"{{ logsBtnStyle }}\" style-hover=\"background:rgba(255,255,255,0.14);\">\n        <span style=\"font-size:16px; line-height:1; color:#a9d8ae;\">✎<\u002Fspan>\n        <span style=\"display:flex; flex-direction:column; gap:1px; text-align:left;\">\n          <span style=\"font-size:13.5px; font-weight:700;\">Running Logs<\u002Fspan>\n          <span style=\"font-size:10.5px; font-weight:500; color:#9cc4a1;\">Track the light, the Silmarils &amp; more<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"padding:12px 20px 14px 20px; border-bottom:1px solid rgba(255,255,255,0.10);\">\n      <button onclick=\"{{ toggleRef }}\" style=\"display:flex; align-items:center; gap:9px; width:100%; text-align:left; background:none; border:none; cursor:pointer; font-family:inherit; padding:5px 8px; border-radius:8px;\" style-hover=\"background:rgba(255,255,255,0.06);\">\n        <span style=\"{{ refChevronStyle }}\">▸<\u002Fspan>\n        <span style=\"flex:1; min-width:0; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-weight:600; color:#9cc4a1;\">Reference<\u002Fspan>\n      <\u002Fbutton>\n      <sc-if value=\"{{ refOpen }}\">\n        <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:9px;\">\n          <a href=\"https://www.theonering.com/maps-of-middle-earth/\" target=\"_blank\" rel=\"noopener\" style=\"display:flex; align-items:center; gap:10px; text-decoration:none; font-size:13.5px; font-weight:600; color:#eef2e9; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); border-radius:9px; padding:11px 14px;\" style-hover=\"background:rgba(255,255,255,0.14);\">\n            <span style=\"font-size:15px; line-height:1; color:#a9d8ae;\">⚲<\u002Fspan>Maps\n          <\u002Fa>\n          <a href=\"https://monarchycharts.com/middle-earth\" target=\"_blank\" rel=\"noopener\" style=\"display:flex; align-items:center; gap:10px; text-decoration:none; font-size:13.5px; font-weight:600; color:#eef2e9; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); border-radius:9px; padding:11px 14px;\" style-hover=\"background:rgba(255,255,255,0.14);\">\n            <span style=\"font-size:15px; line-height:1; color:#a9d8ae;\">⚄<\u002Fspan>Family Trees\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"padding:14px 20px 8px 20px;\">\n      <div style=\"display:flex; align-items:center; gap:9px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); border-radius:9px; padding:0 12px;\">\n        <span style=\"font-size:14px; color:#7fae86; line-height:1;\">⚲<\u002Fspan>\n        <input class=\"silm-search\" value=\"{{ query }}\" onchange=\"{{ onSearch }}\" placeholder=\"Search chapters &amp; tales…\" style=\"flex:1; min-width:0; background:transparent; border:none; outline:none; color:#eef2e9; font-family:inherit; font-size:13.5px; font-weight:500; padding:10px 0;\">\n        <sc-if value=\"{{ hasQuery }}\">\n          <button onclick=\"{{ clearSearch }}\" style=\"background:none; border:none; color:#9cc4a1; cursor:pointer; font-size:16px; line-height:1; padding:2px;\">×<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <nav class=\"silm-scroll\" style=\"flex:1; overflow-y:auto; padding:4px 16px 24px 16px;\">\n      <sc-for list=\"{{ groups }}\" as=\"group\" hint-placeholder-count=\"5\">\n        <div style=\"margin-top:12px;\">\n          <button onclick=\"{{ group.onToggle }}\" style=\"display:flex; align-items:center; gap:9px; width:100%; text-align:left; background:none; border:none; cursor:pointer; font-family:inherit; padding:7px 12px 8px 12px; border-radius:8px;\" style-hover=\"background:rgba(255,255,255,0.06);\">\n            <span style=\"{{ group.chevronStyle }}\">▸<\u002Fspan>\n            <span style=\"flex:1; min-width:0; font-size:10.5px; letter-spacing:0.2em; text-transform:uppercase; font-weight:700; color:#7fae86;\">{{ group.title }}<\u002Fspan>\n            <span style=\"flex:0 0 auto; font-size:10px; font-weight:600; color:#5f8f66; letter-spacing:0.02em;\">{{ group.countLabel }}<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ group.open }}\">\n            <sc-for list=\"{{ group.entries }}\" as=\"entry\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ entry.onSelect }}\" style=\"{{ entry.rowStyle }}\" style-hover=\"background:rgba(255,255,255,0.09);\">\n                <span style=\"{{ entry.checkStyle }}\">{{ entry.check }}<\u002Fspan>\n                <span style=\"display:flex; flex-direction:column; gap:2px; text-align:left; min-width:0;\">\n                  <span style=\"font-size:10px; letter-spacing:0.1em; text-transform:uppercase; font-weight:600; color:{{ entry.labelColor }};\">{{ entry.label }}<\u002Fspan>\n                  <span style=\"font-size:13px; font-weight:500; line-height:1.3; color:{{ entry.titleColor }};\">{{ entry.title }}<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ noResults }}\">\n        <div style=\"padding:22px 14px; text-align:center; font-size:13px; color:#9cc4a1;\">No chapters match \"{{ query }}\".<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fnav>\n\n    <div style=\"padding:13px 20px; border-top:1px solid rgba(255,255,255,0.10);\">\n      <sc-if value=\"{{ signedIn }}\">\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <span style=\"flex:0 0 auto; width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#a9d8ae; text-transform:uppercase;\">{{ userInitial }}<\u002Fspan>\n          <div style=\"flex:1; min-width:0;\">\n            <div style=\"font-size:12.5px; font-weight:600; color:#eef2e9; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ userEmail }}<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:6px; margin-top:2px;\">\n              <span style=\"flex:0 0 auto; width:7px; height:7px; border-radius:50%; background:{{ syncColor }};\"><\u002Fspan>\n              <span style=\"font-size:10.5px; font-weight:500; color:#9cc4a1;\">{{ syncLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ syncDetail }}\">\n              <div style=\"font-size:10px; line-height:1.4; color:#f3c9c9; margin-top:3px; word-break:break-word;\">{{ syncDetail }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <button onclick=\"{{ onSignOut }}\" style=\"flex:0 0 auto; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14); color:#eef2e9; border-radius:8px; padding:7px 11px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit;\" style-hover=\"background:rgba(255,255,255,0.14);\">Sign out<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ signedOut }}\">\n        <button onclick=\"{{ signInWithGoogle }}\" disabled=\"{{ authBusy }}\" style=\"{{ googleBtnStyle }}\" style-hover=\"filter:brightness(0.96);\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 48 48\" style=\"flex:0 0 auto;\"><path fill=\"#4285F4\" d=\"M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z\"><\u002Fpath><path fill=\"#34A853\" d=\"M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z\"><\u002Fpath><path fill=\"#FBBC05\" d=\"M11.69 28.18c-.44-1.32-.69-2.73-.69-4.18s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z\"><\u002Fpath><path fill=\"#EA4335\" d=\"M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z\"><\u002Fpath><\u002Fsvg>\n        {{ googleBtnLabel }}\n        <\u002Fbutton>\n        <sc-if value=\"{{ authError }}\">\n          <div style=\"margin-top:9px; font-size:11.5px; line-height:1.45; color:#f3c9c9; background:rgba(160,40,40,0.28); border:1px solid rgba(232,160,160,0.3); border-radius:8px; padding:8px 11px;\">{{ authError }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"padding:12px 20px 16px 20px; display:flex; gap:9px;\">\n      <button onclick=\"{{ onExport }}\" style=\"flex:1; display:flex; align-items:center; justify-content:center; gap:7px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; letter-spacing:0.03em; color:#eef2e9; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14); border-radius:9px; padding:10px;\" style-hover=\"background:rgba(255,255,255,0.14);\">\n        <span style=\"font-size:13px; line-height:1; color:#a9d8ae;\">⇩<\u002Fspan>Export\n      <\u002Fbutton>\n      <button onclick=\"{{ onImportClick }}\" style=\"flex:1; display:flex; align-items:center; justify-content:center; gap:7px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; letter-spacing:0.03em; color:#eef2e9; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14); border-radius:9px; padding:10px;\" style-hover=\"background:rgba(255,255,255,0.14);\">\n        <span style=\"font-size:13px; line-height:1; color:#a9d8ae;\">⇧<\u002Fspan>Import\n      <\u002Fbutton>\n      <input id=\"silm-import-input\" type=\"file\" accept=\"application/json,.json\" onchange=\"{{ onImportFile }}\" style=\"display:none;\">\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <div style=\"flex:1; min-width:0; height:100%; display:flex; flex-direction:column;\">\n    <sc-if value=\"{{ isMobile }}\">\n      <div style=\"flex:0 0 auto; display:flex; align-items:center; gap:12px; padding:11px 14px; background:#11521b; color:#eef2e9; border-bottom:1px solid #0c3c14; z-index:30;\">\n        <button onclick=\"{{ openDrawer }}\" style=\"flex:0 0 auto; width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); border-radius:9px; color:#eef2e9; cursor:pointer; font-size:18px; line-height:1;\">☰<\u002Fbutton>\n        <div style=\"flex:1; min-width:0;\">\n          <div style=\"font-size:10px; letter-spacing:0.24em; text-transform:uppercase; font-weight:600; color:#9cc4a1;\">The Silmarillion<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; margin-top:5px;\">\n            <div style=\"flex:1; height:5px; background:rgba(255,255,255,0.14); border-radius:99px; overflow:hidden;\"><div style=\"height:100%; width:{{ progressPct }}%; background:linear-gradient(90deg,#7dc088,#a9d8ae);\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font-size:11px; font-weight:600; white-space:nowrap;\">{{ progressLabel }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ signedIn }}\">\n          <span style=\"flex:0 0 auto; width:9px; height:9px; border-radius:50%; background:{{ syncColor }};\" title=\"{{ syncLabel }}\"><\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <main class=\"silm-scroll\" style=\"flex:1; min-height:0; overflow-y:auto;\">\n      <div style=\"max-width:760px; margin:0 auto; padding:clamp(28px,5vw,56px) clamp(20px,5vw,56px) 110px;\">\n\n        <sc-if value=\"{{ isChapterView }}\">\n          <div style=\"display:flex; flex-wrap:wrap; align-items:flex-start; justify-content:space-between; gap:18px 24px; margin-bottom:36px; padding-bottom:26px; border-bottom:1.5px solid #e0dbcb;\">\n            <div style=\"min-width:0;\">\n              <div style=\"font-size:12px; letter-spacing:0.22em; text-transform:uppercase; font-weight:700; color:#11521b; margin-bottom:12px;\">{{ current.label }}<\u002Fdiv>\n              <h1 style=\"font-size:clamp(25px,6vw,34px); font-weight:800; line-height:1.14; letter-spacing:-0.015em; margin:0; color:#1c1b16;\">{{ current.title }}<\u002Fh1>\n            <\u002Fdiv>\n            <button onclick=\"{{ toggleRead }}\" style=\"{{ readBtnStyle }}\" style-hover=\"filter:brightness(0.96);\">{{ readBtnLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n\n          <sc-for list=\"{{ current.blocks }}\" as=\"block\" hint-placeholder-count=\"4\">\n            <section style=\"margin-bottom:34px;\">\n              <sc-if value=\"{{ block.h }}\">\n                <h2 style=\"font-size:12px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; color:#7a8a6f; margin:0 0 14px 0;\">{{ block.h }}<\u002Fh2>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ block.isProse }}\">\n                <p style=\"font-size:16.5px; line-height:1.72; margin:0; color:#37362e; text-wrap:pretty;\">{{ block.body }}<\u002Fp>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ block.isLink }}\">\n                <div>\n                  <sc-if value=\"{{ block.body }}\">\n                    <p style=\"font-size:16.5px; line-height:1.72; margin:0 0 16px 0; color:#37362e; text-wrap:pretty;\">{{ block.body }}<\u002Fp>\n                  <\u002Fsc-if>\n                  <a href=\"{{ block.href }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:9px; text-decoration:none; font-size:13.5px; font-weight:700; letter-spacing:0.03em; color:#fff; background:#11521b; border:1.5px solid #11521b; padding:12px 22px; border-radius:99px;\" style-hover=\"filter:brightness(0.94);\">\n                    <span style=\"font-size:15px; line-height:1;\">⚲<\u002Fspan>{{ block.label }}\n                  <\u002Fa>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ block.isList }}\">\n                <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px;\">\n                  <sc-for list=\"{{ block.listItems }}\" as=\"item\" hint-placeholder-count=\"3\">\n                    <li style=\"display:flex; gap:12px; align-items:baseline; font-size:15.5px; line-height:1.62; color:#37362e;\">\n                      <span style=\"flex:0 0 auto; color:#11521b; font-weight:700; min-width:16px;\">{{ item.marker }}<\u002Fspan>\n                      <span style=\"text-wrap:pretty;\"><strong style=\"font-weight:700; color:#1c1b16;\">{{ item.lead }}<\u002Fstrong>{{ item.text }}<\u002Fspan>\n                    <\u002Fli>\n                  <\u002Fsc-for>\n                <\u002Ful>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ block.isQuestions }}\">\n                <div style=\"display:flex; flex-direction:column; gap:16px;\">\n                  <sc-for list=\"{{ block.questions }}\" as=\"q\" hint-placeholder-count=\"3\">\n                    <div style=\"background:#fbfaf5; border:1px solid #e6e1d1; border-left:3px solid #11521b; border-radius:10px; padding:16px 18px;\">\n                      <div style=\"display:flex; gap:16px; align-items:flex-start;\">\n                        <span style=\"flex:0 0 auto; width:26px; height:26px; border-radius:50%; background:#11521b; color:#fff; font-size:12.5px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-top:1px;\">{{ q.n }}<\u002Fspan>\n                        <p style=\"margin:0; font-size:15px; line-height:1.62; color:#33322b; text-wrap:pretty;\">{{ q.text }}<\u002Fp>\n                      <\u002Fdiv>\n                      <textarea class=\"silm-note\" value=\"{{ q.answer }}\" onchange=\"{{ q.onAnswer }}\" placeholder=\"Write your response…\" style=\"width:100%; min-height:76px; resize:vertical; margin-top:14px; font-family:'Montserrat',sans-serif; font-size:14.5px; line-height:1.6; color:#33322b; background:#ffffff; border:1px solid #e0dbc9; border-radius:9px; padding:12px 14px; outline:none;\" style-focus=\"border-color:#11521b; box-shadow:0 0 0 3px rgba(17,82,27,0.12);\"><\u002Ftextarea>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsection>\n          <\u002Fsc-for>\n\n          <div style=\"margin-top:48px; padding-top:30px; border-top:1.5px solid #e0dbcb;\">\n            <h2 style=\"font-size:12px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; color:#7a8a6f; margin:0 0 6px 0;\">My Notes<\u002Fh2>\n            <p style=\"font-size:12.5px; color:#8a8676; margin:0 0 14px 0;\">{{ notesHint }}<\u002Fp>\n            <textarea class=\"silm-note\" value=\"{{ currentNote }}\" onchange=\"{{ onNote }}\" placeholder=\"Jot down thoughts, favorite lines, or answers to bring to your group…\" style=\"width:100%; min-height:150px; resize:vertical; font-family:'Montserrat',sans-serif; font-size:15px; line-height:1.6; color:#33322b; background:#fbfaf5; border:1px solid #ddd8c7; border-radius:12px; padding:16px 18px; outline:none;\" style-focus=\"border-color:#11521b; box-shadow:0 0 0 3px rgba(17,82,27,0.12);\"><\u002Ftextarea>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:44px; padding-top:26px; border-top:1.5px solid #e0dbcb; display:flex; gap:14px;\">\n            <div style=\"flex:1; min-width:0;\">\n              <sc-if value=\"{{ prev.show }}\">\n                <button onclick=\"{{ prev.onClick }}\" style=\"width:100%; text-align:left; cursor:pointer; font-family:inherit; background:#fbfaf5; border:1px solid #e0dbc9; border-radius:12px; padding:14px 18px; display:flex; flex-direction:column; gap:4px;\" style-hover=\"border-color:#11521b;\">\n                  <span style=\"font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-weight:700; color:#7a8a6f;\">← Previous<\u002Fspan>\n                  <span style=\"font-size:14px; font-weight:600; color:#1c1b16; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ prev.title }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"flex:1; min-width:0;\">\n              <sc-if value=\"{{ next.show }}\">\n                <button onclick=\"{{ next.onClick }}\" style=\"width:100%; text-align:right; cursor:pointer; font-family:inherit; background:#fbfaf5; border:1px solid #e0dbc9; border-radius:12px; padding:14px 18px; display:flex; flex-direction:column; gap:4px; align-items:flex-end;\" style-hover=\"border-color:#11521b;\">\n                  <span style=\"font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-weight:700; color:#7a8a6f;\">Next →<\u002Fspan>\n                  <span style=\"font-size:14px; font-weight:600; color:#1c1b16; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;\">{{ next.title }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isTrackerView }}\">\n          <div style=\"margin-bottom:34px; padding-bottom:26px; border-bottom:1.5px solid #e0dbcb;\">\n            <div style=\"font-size:12px; letter-spacing:0.22em; text-transform:uppercase; font-weight:700; color:#11521b; margin-bottom:12px;\">Running Logs<\u002Fdiv>\n            <h1 style=\"font-size:clamp(25px,6vw,34px); font-weight:800; line-height:1.14; letter-spacing:-0.015em; margin:0 0 14px 0; color:#1c1b16;\">Track the Threads<\u002Fh1>\n            <p style=\"font-size:16px; line-height:1.7; margin:0; color:#37362e; text-wrap:pretty; max-width:620px;\">The guide keeps asking you to watch a few things across the whole book. Keep those running lists here — they persist as you move between chapters.<\u002Fp>\n          <\u002Fdiv>\n\n          <sc-for list=\"{{ trackers }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <section style=\"margin-bottom:30px;\">\n              <h2 style=\"font-size:17px; font-weight:800; letter-spacing:-0.01em; color:#11521b; margin:0 0 4px 0;\">{{ t.h }}<\u002Fh2>\n              <p style=\"font-size:13.5px; line-height:1.55; color:#8a8676; margin:0 0 12px 0; text-wrap:pretty;\">{{ t.hint }}<\u002Fp>\n              <textarea class=\"silm-note\" value=\"{{ t.value }}\" onchange=\"{{ t.onChange }}\" placeholder=\"Add to this log as you read…\" style=\"width:100%; min-height:120px; resize:vertical; font-family:'Montserrat',sans-serif; font-size:15px; line-height:1.65; color:#33322b; background:#fbfaf5; border:1px solid #ddd8c7; border-radius:12px; padding:15px 18px; outline:none;\" style-focus=\"border-color:#11521b; box-shadow:0 0 0 3px rgba(17,82,27,0.12);\"><\u002Ftextarea>\n            <\u002Fsection>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst TRACKER_VIEW = '__trackers__';\n\nclass Component extends DCLogic {\n  state = {\n    data: [], parts: [], currentId: null,\n    read: [], notes: {}, answers: {}, trackers: {}, query: '',\n    isMobile: false, drawerOpen: false,\n    collapsed: {}, collapsedInit: false, refOpen: false,\n    user: null, syncState: 'idle', syncDetail: '',\n    authError: '', authBusy: false,\n  };\n\n  FIREBASE_CONFIG = {\n    apiKey: \"AIzaSyCLc86IhbjPhl0Qfp6Ws_8uyTeeTqycbsI\",\n    authDomain: \"the-silmarillion.firebaseapp.com\",\n    projectId: \"the-silmarillion\",\n    storageBucket: \"the-silmarillion.firebasestorage.app\",\n    messagingSenderId: \"915752008207\",\n    appId: \"1:915752008207:web:286caaf77be2281e60c17a\",\n  };\n\n  TRACKER_DEFS = [\n    { key: 'light', h: 'The Light', hint: 'Where does light appear, move, die, or persist? The Two Trees \\u2192 the Silmarils \\u2192 the Sun & Moon \\u2192 E\\u00e4rendil\\u2019s star \\u2192 the phial Frodo carries.' },\n    { key: 'silmarils', h: 'The Silmarils', hint: 'Who holds each jewel, who gives it away, and how it ends. Holding them destroys; giving them away saves.' },\n    { key: 'walls', h: 'Walled Paradises', hint: 'Every sanctuary and its fate \\u2014 Valinor, Doriath\\u2019s Girdle, hidden Gondolin, N\\u00famenor, and later the Shire.' },\n    { key: 'hope', h: 'Glimpses of Hope', hint: 'The eucatastrophes and unlooked-for turns that push back against \"the long defeat.\"' },\n  ];\n\n  componentDidMount() {\n    this.handleResize();\n    window.addEventListener('resize', this.handleResize);\n    window.addEventListener('online', this.handleNet);\n    window.addEventListener('offline', this.handleNet);\n\n    const local = this.readLocal();\n    let tries = 0;\n    const boot = () => {\n      const data = window.SILM_DATA || [];\n      const parts = window.SILM_PARTS || [];\n      if (!data.length && tries++ < 60) { setTimeout(boot, 50); return; }\n      const exists = data.some((d) => d.id === local.currentId);\n      const currentId = exists ? local.currentId : (data[0] && data[0].id) || null;\n      this.setState({\n        data, parts,\n        read: local.read, notes: local.notes, answers: local.answers, trackers: local.trackers,\n        currentId,\n        collapsed: this.defaultCollapsed(data, parts, currentId),\n        collapsedInit: true,\n      });\n    };\n    boot();\n\n    this.initFirebase();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this.handleResize);\n    window.removeEventListener('online', this.handleNet);\n    window.removeEventListener('offline', this.handleNet);\n    if (this._unsub) { this._unsub(); this._unsub = null; }\n    clearTimeout(this._wt);\n  }\n\n  /* ---------- responsive ---------- */\n  handleResize = () => {\n    const m = window.innerWidth <= 880;\n    this.setState((s) => (s.isMobile === m ? null : { isMobile: m, drawerOpen: m ? s.drawerOpen : false }));\n  };\n  openDrawer = () => this.setState({ drawerOpen: true });\n  closeDrawer = () => this.setState({ drawerOpen: false });\n\n  /* ---------- collapsible groups ---------- */\n  defaultCollapsed(data, parts, currentId) {\n    // collapse every part except the one holding the current chapter\n    const cur = data.find((d) => d.id === currentId);\n    const openPart = cur ? cur.partId : null;\n    const c = {};\n    parts.forEach((p) => { if (p.id !== openPart) c[p.id] = true; });\n    return c;\n  }\n  toggleGroup(pid) {\n    this.setState((s) => ({ collapsed: { ...s.collapsed, [pid]: !s.collapsed[pid] } }));\n  }\n  toggleRef = () => this.setState((s) => ({ refOpen: !s.refOpen }));\n\n  /* ---------- local storage ---------- */\n  readLocal() {\n    let read = [], notes = {}, answers = {}, trackers = {}, currentId = null;\n    try { read = JSON.parse(localStorage.getItem('silm.read') || '[]'); } catch (e) {}\n    try { notes = JSON.parse(localStorage.getItem('silm.notes') || '{}'); } catch (e) {}\n    try { answers = JSON.parse(localStorage.getItem('silm.answers') || '{}'); } catch (e) {}\n    try { trackers = JSON.parse(localStorage.getItem('silm.trackers') || '{}'); } catch (e) {}\n    try { currentId = localStorage.getItem('silm.current') || null; } catch (e) {}\n    return { read, notes, answers, trackers, currentId };\n  }\n  loadLocal() {\n    const l = this.readLocal();\n    this.setState({ read: l.read, notes: l.notes, answers: l.answers, trackers: l.trackers });\n  }\n  save(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {} }\n\n  /* ---------- firebase ---------- */\n  initFirebase() {\n    let tries = 0;\n    const go = () => {\n      if (!window.firebase || !firebase.initializeApp) {\n        if (tries++ < 100) { setTimeout(go, 60); return; }\n        return;\n      }\n      try {\n        if (!firebase.apps.length) firebase.initializeApp(this.FIREBASE_CONFIG);\n        this.auth = firebase.auth();\n        this.db = firebase.firestore();\n        this.db.enablePersistence({ synchronizeTabs: true }).catch(() => {});\n        this.auth.onAuthStateChanged((u) => this.onAuth(u));\n        this.auth.getRedirectResult()\n          .then((res) => { if (res && res.user) this.setState({ authBusy: false, authError: '' }); })\n          .catch((err) => {\n            // iOS Safari can reject getRedirectResult with auth/argument-error even when no\n            // redirect was in progress — that's benign noise, so log it but never show it.\n            console.warn('[Silmarillion] getRedirectResult:', err && err.code, err && err.message);\n          });\n      } catch (e) {}\n    };\n    go();\n  }\n\n  onAuth(u) {\n    if (u) {\n      this.user = { uid: u.uid, email: u.email, name: u.displayName || '', photo: u.photoURL || '' };\n      this.setState({ user: this.user, syncState: 'syncing', authBusy: false, authError: '' });\n      this.subscribe(u.uid);\n    } else {\n      this.user = null;\n      if (this._unsub) { this._unsub(); this._unsub = null; }\n      this.setState({ user: null, syncState: 'idle' });\n      this.loadLocal();\n    }\n  }\n\n  subscribe(uid) {\n    if (this._unsub) { this._unsub(); this._unsub = null; }\n    this._unsub = this.db.collection('users').doc(uid).onSnapshot(\n      (snap) => {\n        const d = snap.data() || {};\n        this.setState({\n          read: Array.isArray(d.read) ? d.read : [],\n          notes: (d.notes && typeof d.notes === 'object') ? d.notes : {},\n          answers: (d.answers && typeof d.answers === 'object') ? d.answers : {},\n          trackers: (d.trackers && typeof d.trackers === 'object') ? d.trackers : {},\n        });\n        let sync = 'saved';\n        if (snap.metadata.hasPendingWrites) sync = 'syncing';\n        else if (snap.metadata.fromCache && !navigator.onLine) sync = 'offline';\n        this.setState({ syncState: sync, syncDetail: '' });\n      },\n      (err) => {\n        console.error('[Silmarillion] Firestore snapshot error:', err && err.code, err && err.message, err);\n        this.setState({ syncState: 'error', syncDetail: this.syncReason(err) });\n      }\n    );\n  }\n\n  syncReason(err) {\n    const c = (err && err.code) || '';\n    if (c.indexOf('permission-denied') !== -1) return 'Permission denied \\u2014 check Firestore rules are published.';\n    if (c.indexOf('unavailable') !== -1) return 'Firestore unavailable \\u2014 is the database created?';\n    if (c.indexOf('not-found') !== -1) return 'Database not found \\u2014 create the Firestore database.';\n    if (c.indexOf('failed-precondition') !== -1) return 'Firestore not ready \\u2014 create the database in the console.';\n    return (err && err.code) || 'Unknown sync error.';\n  }\n\n  handleNet = () => {\n    if (!this.user) return;\n    this.setSync(navigator.onLine ? 'saved' : 'offline');\n  };\n\n  setSync(s) { this.setState({ syncState: s }); }\n\n  cloudWrite(patch) {\n    this._pending = Object.assign({}, this._pending || {}, patch);\n    this.setSync('syncing');\n    clearTimeout(this._wt);\n    this._wt = setTimeout(() => {\n      const p = this._pending; this._pending = null;\n      if (!this.user || !this.db) return;\n      this.db.collection('users').doc(this.user.uid).set(p, { merge: true })\n        .catch((err) => {\n          console.error('[Silmarillion] Firestore write error:', err && err.code, err && err.message, err);\n          this.setState({ syncState: 'error', syncDetail: this.syncReason(err) });\n        });\n    }, 500);\n  }\n\n  persist(field, value) {\n    if (this.user && this.db) {\n      this.cloudWrite({ [field]: value });\n    } else {\n      const map = { read: 'silm.read', notes: 'silm.notes', answers: 'silm.answers', trackers: 'silm.trackers' };\n      this.save(map[field], value);\n    }\n  }\n\n  /* ---------- navigation ---------- */\n  select(id) {\n    this.setState({ currentId: id, drawerOpen: false });\n    try { localStorage.setItem('silm.current', id); } catch (e) {}\n    const main = document.querySelector('main.silm-scroll');\n    if (main) main.scrollTop = 0;\n  }\n  openTrackers = () => this.select(TRACKER_VIEW);\n\n  /* ---------- data mutations ---------- */\n  toggleRead = () => {\n    const id = this.state.currentId;\n    if (!id || id === TRACKER_VIEW) return;\n    const has = this.state.read.includes(id);\n    const read = has ? this.state.read.filter((x) => x !== id) : [...this.state.read, id];\n    this.setState({ read });\n    this.persist('read', read);\n  };\n\n  onNote = (e) => {\n    const id = this.state.currentId;\n    if (!id) return;\n    const notes = { ...this.state.notes, [id]: e.target.value };\n    this.setState({ notes });\n    this.persist('notes', notes);\n  };\n\n  setAnswer(key, value) {\n    const answers = { ...this.state.answers, [key]: value };\n    this.setState({ answers });\n    this.persist('answers', answers);\n  }\n\n  setTracker(key, value) {\n    const trackers = { ...this.state.trackers, [key]: value };\n    this.setState({ trackers });\n    this.persist('trackers', trackers);\n  }\n\n  onSearch = (e) => this.setState({ query: e.target.value });\n  clearSearch = () => this.setState({ query: '' });\n\n  /* ---------- auth ---------- */\n  signInWithGoogle = (retries) => {\n    retries = retries || 0;\n    // Firebase scripts may still be initializing when the user taps — wait and retry instead of erroring.\n    if (!this.auth || !window.firebase) {\n      if (retries < 25) {\n        this.setState({ authBusy: true, authError: '' });\n        setTimeout(() => this.signInWithGoogle(retries + 1), 200);\n      } else {\n        this.setState({ authBusy: false, authError: 'Cloud service didn\\u2019t load \\u2014 check your connection and try again.' });\n      }\n      return;\n    }\n    this.setState({ authBusy: true, authError: '' });\n    const provider = new firebase.auth.GoogleAuthProvider();\n    provider.setCustomParameters({ prompt: 'select_account' });\n\n    // iOS Safari restricts popups (storage partitioning / COOP) and rejects signInWithPopup\n    // with argument-error — use the full-page redirect flow there instead.\n    if (this.isTouchDevice()) {\n      Promise.resolve(this.auth.signInWithRedirect(provider)).catch((e) => {\n        console.error('[Silmarillion] redirect error:', e && e.code, e && e.message);\n        this.setState({ authBusy: false, authError: this.friendly(e) });\n      });\n      return;\n    }\n\n    this.auth.signInWithPopup(provider)\n      .then(() => this.setState({ authBusy: false }))\n      .catch((err) => {\n        const c = (err && err.code) || '';\n        if (c.indexOf('popup-closed') !== -1 || c.indexOf('cancelled-popup') !== -1) {\n          this.setState({ authBusy: false, authError: '' });\n        } else if (c.indexOf('popup-blocked') !== -1 || c.indexOf('argument-error') !== -1 || c.indexOf('operation-not-supported') !== -1) {\n          Promise.resolve(this.auth.signInWithRedirect(provider)).catch((e) => this.setState({ authBusy: false, authError: this.friendly(e) }));\n        } else {\n          this.setState({ authBusy: false, authError: this.friendly(err) });\n        }\n      });\n  };\n\n  isTouchDevice() {\n    if (this.state.isMobile) return true;\n    return (typeof window !== 'undefined') && (('ontouchstart' in window) || (navigator.maxTouchPoints > 0)) && window.innerWidth <= 1024;\n  }\n\n  onSignOut = () => { if (this.auth) this.auth.signOut(); };\n\n  friendly(e) {\n    const c = (e && e.code) || '';\n    if (c.indexOf('account-exists') !== -1) return 'An account already exists with this email under a different sign-in method.';\n    if (c.indexOf('unauthorized-domain') !== -1) return 'This domain isn\\u2019t authorized in Firebase yet.';\n    if (c.indexOf('operation-not-allowed') !== -1) return 'Google sign-in isn\\u2019t enabled in Firebase yet.';\n    if (c.indexOf('too-many-requests') !== -1) return 'Too many attempts. Please wait a moment and try again.';\n    if (c.indexOf('network') !== -1) return 'Network error \\u2014 check your connection.';\n    return (e && e.message) || 'Sign-in failed. Please try again.';\n  }\n\n  /* ---------- import / export ---------- */\n  onExport = () => {\n    const { read, notes, answers, trackers, currentId } = this.state;\n    const payload = { app: 'silmarillion-companion', version: 1, exportedAt: new Date().toISOString(), read, notes, answers, trackers, current: currentId };\n    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url;\n    a.download = 'silmarillion-notes.json';\n    document.body.appendChild(a);\n    a.click();\n    a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  };\n\n  onImportClick = () => {\n    const input = document.getElementById('silm-import-input');\n    if (input) input.click();\n  };\n\n  onImportFile = (e) => {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    file.text().then((txt) => {\n      let d;\n      try { d = JSON.parse(txt); } catch (err) { alert('That file could not be read as reading-companion data.'); return; }\n      const read = Array.isArray(d.read) ? d.read : this.state.read;\n      const notes = d.notes && typeof d.notes === 'object' ? d.notes : this.state.notes;\n      const answers = d.answers && typeof d.answers === 'object' ? d.answers : this.state.answers;\n      const trackers = d.trackers && typeof d.trackers === 'object' ? d.trackers : this.state.trackers;\n      this.setState({ read, notes, answers, trackers });\n      this.persist('read', read);\n      this.persist('notes', notes);\n      this.persist('answers', answers);\n      this.persist('trackers', trackers);\n    });\n    e.target.value = '';\n  };\n\n  renderVals() {\n    const { data, parts, currentId, read, query, isMobile, drawerOpen, user, syncState, collapsed } = this.state;\n    const readSet = new Set(read);\n    const total = data.length;\n    const readCount = data.filter((d) => readSet.has(d.id)).length;\n    const progressPct = total ? Math.round((readCount / total) * 100) : 0;\n\n    const q = (query || '').trim().toLowerCase();\n    const match = (d) => !q || (d.label + ' ' + d.title).toLowerCase().includes(q);\n\n    const rowBase = 'display:flex; gap:11px; align-items:center; width:100%; text-align:left; border:none; cursor:pointer; padding:9px 12px; border-radius:9px; margin-bottom:2px; font-family:inherit; transition:background 0.15s ease;';\n    const isTracker = currentId === TRACKER_VIEW;\n\n    let visibleCount = 0;\n    const chevBase = 'flex:0 0 auto; display:inline-block; font-size:9px; line-height:1; color:#7fae86; transition:transform 0.2s ease; transform:rotate(';\n    const groups = parts.map((p) => {\n      const partChapters = data.filter((d) => d.partId === p.id);\n      const entries = data.filter((d) => d.partId === p.id && match(d)).map((d) => {\n        const active = d.id === currentId;\n        const isRead = readSet.has(d.id);\n        visibleCount++;\n        return {\n          id: d.id, label: d.label, title: d.title,\n          onSelect: () => this.select(d.id),\n          rowStyle: rowBase + (active ? 'background:rgba(255,255,255,0.16);' : 'background:transparent;'),\n          check: isRead ? '\\u2713' : '',\n          checkStyle: 'flex:0 0 auto; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; ' +\n            (isRead ? 'background:#a9d8ae; color:#11521b;' : 'background:transparent; border:1.5px solid rgba(255,255,255,0.28); color:transparent;'),\n          labelColor: active ? '#cfe6d2' : '#7fae86',\n          titleColor: active ? '#ffffff' : '#dbe6dc',\n        };\n      });\n      const open = q ? true : !collapsed[p.id];\n      const partRead = partChapters.filter((d) => readSet.has(d.id)).length;\n      return {\n        id: p.id, title: p.title, entries, open,\n        onToggle: () => this.toggleGroup(p.id),\n        chevronStyle: chevBase + (open ? '90deg' : '0deg') + ');',\n        countLabel: partRead + '/' + partChapters.length,\n      };\n    }).filter((g) => g.entries.length > 0);\n\n    const cur = data.find((d) => d.id === currentId) || null;\n    const blocks = cur ? cur.blocks.map((b, bi) => {\n      const isQuestions = b.kind === 'questions';\n      const isList = b.kind === 'list';\n      const isProse = b.kind === 'prose';\n      const isLink = b.kind === 'link';\n      return {\n        h: isQuestions ? (b.h || 'For Discussion') : (b.h || ''),\n        isProse, isList, isQuestions, isLink,\n        body: b.body || '',\n        href: b.href || '#',\n        label: b.label || 'Open',\n        listItems: isList ? (b.items || []).map((it, i) => ({\n          marker: b.ordered ? (i + 1) + '.' : '\\u25C6',\n          lead: it.lead || '', text: it.text || '',\n        })) : [],\n        questions: isQuestions ? (b.items || []).map((t, i) => {\n          const key = currentId + '::' + bi + '::' + i;\n          return { n: i + 1, text: t, answer: this.state.answers[key] || '', onAnswer: (e) => this.setAnswer(key, e.target.value) };\n        }) : [],\n      };\n    }) : [];\n\n    const curIsRead = cur ? readSet.has(cur.id) : false;\n    const readBtnBase = 'flex:0 0 auto; cursor:pointer; font-family:inherit; font-size:12.5px; font-weight:700; letter-spacing:0.04em; padding:11px 18px; border-radius:99px; white-space:nowrap; transition:filter 0.15s ease;';\n\n    const idx = cur ? data.findIndex((d) => d.id === cur.id) : -1;\n    const prevD = idx > 0 ? data[idx - 1] : null;\n    const nextD = idx >= 0 && idx < data.length - 1 ? data[idx + 1] : null;\n\n    const logsBtnBase = 'display:flex; align-items:center; gap:11px; width:100%; text-align:left; border:none; cursor:pointer; padding:12px 14px; border-radius:10px; font-family:inherit; transition:background 0.15s ease;';\n\n    // responsive layout\n    const rootStyle = 'display:flex; flex-direction:' + (isMobile ? 'column' : 'row') + '; height:100vh; width:100%; overflow:hidden; background:#f4f1e8; position:relative;';\n    const asideBase = 'height:100%; display:flex; flex-direction:column; background:#11521b; color:#eef2e9; border-right:1px solid #0c3c14;';\n    const asideStyle = asideBase + (isMobile\n      ? 'position:fixed; top:0; left:0; bottom:0; width:min(340px,86vw); z-index:50; transform:translateX(' + (drawerOpen ? '0' : '-100%') + '); transition:transform 0.28s ease; box-shadow:' + (drawerOpen ? '0 0 60px rgba(0,0,0,0.4)' : 'none') + ';'\n      : 'width:340px; flex:0 0 340px; position:relative;');\n\n    // sync status\n    const sm = {\n      idle: ['Not signed in', 'rgba(255,255,255,0.3)'],\n      syncing: ['Syncing\\u2026', '#d8bd76'],\n      saved: ['Saved to cloud', '#a9d8ae'],\n      offline: ['Offline \\u2014 will sync', '#c9c2ad'],\n      error: ['Sync error', '#e8a0a0'],\n    };\n    const syncPair = sm[syncState] || sm.idle;\n\n    const { authBusy } = this.state;\n\n    const notesHint = user\n      ? 'Saved to your account \\u2014 synced across your devices.'\n      : 'Saved in this browser. Sign in to sync across devices.';\n\n    return {\n      rootStyle,\n      asideStyle,\n      isMobile,\n      drawerBackdrop: isMobile && drawerOpen,\n      openDrawer: this.openDrawer,\n      closeDrawer: this.closeDrawer,\n\n      groups,\n      noResults: !!q && visibleCount === 0,\n      query: query || '',\n      hasQuery: !!query,\n      onSearch: this.onSearch,\n      clearSearch: this.clearSearch,\n      progressPct,\n      progressLabel: readCount + ' / ' + total,\n\n      toggleRef: this.toggleRef,\n      refOpen: this.state.refOpen,\n      refChevronStyle: 'flex:0 0 auto; display:inline-block; font-size:9px; line-height:1; color:#9cc4a1; transition:transform 0.2s ease; transform:rotate(' + (this.state.refOpen ? '90deg' : '0deg') + ');',\n\n      openTrackers: this.openTrackers,\n      logsBtnStyle: logsBtnBase + (isTracker ? 'background:rgba(255,255,255,0.16);' : 'background:rgba(255,255,255,0.06);'),\n\n      isChapterView: !isTracker,\n      isTrackerView: isTracker,\n\n      current: cur ? { label: cur.label, title: cur.title, blocks } : { label: '', title: '', blocks: [] },\n      toggleRead: this.toggleRead,\n      readBtnLabel: curIsRead ? '\\u2713  Read' : 'Mark as read',\n      readBtnStyle: readBtnBase + (curIsRead\n        ? 'background:#11521b; color:#fff; border:1.5px solid #11521b;'\n        : 'background:transparent; color:#11521b; border:1.5px solid #11521b;'),\n      currentNote: cur ? (this.state.notes[cur.id] || '') : '',\n      notesHint,\n      onNote: this.onNote,\n\n      prev: prevD ? { show: true, title: prevD.label + ' \\u2014 ' + prevD.title, onClick: () => this.select(prevD.id) } : { show: false },\n      next: nextD ? { show: true, title: nextD.label + ' \\u2014 ' + nextD.title, onClick: () => this.select(nextD.id) } : { show: false },\n\n      trackers: this.TRACKER_DEFS.map((t) => ({\n        h: t.h, hint: t.hint,\n        value: this.state.trackers[t.key] || '',\n        onChange: (e) => this.setTracker(t.key, e.target.value),\n      })),\n\n      onExport: this.onExport,\n      onImportClick: this.onImportClick,\n      onImportFile: this.onImportFile,\n\n      // account + sync\n      signedIn: !!user,\n      signedOut: !user,\n      userEmail: user ? (user.name || user.email) : '',\n      userInitial: user ? ((user.name || user.email || '?').charAt(0)) : '?',\n      syncLabel: syncPair[0],\n      syncColor: syncPair[1],\n      syncDetail: syncState === 'error' ? this.state.syncDetail : '',\n      onSignOut: this.onSignOut,\n\n      // google sign-in\n      signInWithGoogle: this.signInWithGoogle,\n      authError: this.state.authError,\n      authBusy,\n      googleBtnLabel: authBusy ? 'Signing in\\u2026' : 'Sign in with Google',\n      googleBtnStyle: 'display:flex; align-items:center; justify-content:center; gap:10px; width:100%; font-family:inherit; font-size:13px; font-weight:600; letter-spacing:0.01em; color:#3c4043; background:#ffffff; border:none; border-radius:9px; padding:12px; box-shadow:0 1px 2px rgba(0,0,0,0.25); '\n        + (authBusy ? 'opacity:0.7; cursor:default;' : 'cursor:pointer;'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
